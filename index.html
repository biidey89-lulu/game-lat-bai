<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay Thẻ Bài May Mắn</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="auth-overlay" id="authOverlay">
        <div class="auth-box">
            <h2 id="authFormTitle">ĐĂNG NHẬP GAME</h2>
            <div class="input-group">
                <label>Tên tài khoản:</label>
                <input type="text" id="authUsername" placeholder="Nhập tên tài khoản...">
            </div>
            <div class="input-group">
                <label>Mật khẩu:</label>
                <input type="password" id="authPassword" placeholder="Nhập mật khẩu...">
            </div>
            <div class="auth-buttons">
                <button id="loginBtn" class="auth-btn main-btn">Đăng Nhập</button>
                <button id="registerBtn" class="auth-btn sub-btn">Đăng Ký Tài Khoản</button>
            </div>
            <p id="authError" class="auth-error"></p>
        </div>
    </div>

    <div class="main-layout">
        <div class="gacha-container">
            <h1>Vòng Quay Thẻ Bài May Mắn</h1>
            <button id="logoutBtn" class="logout-btn">Đăng Xuất Tài Khoản</button>
            <div class="card-wrapper" id="cardWrapper"></div>
            <button class="reset-btn" id="resetBtn" disabled>Chơi Lượt Mới</button>
        </div>

        <div class="inventory-box">
            <h3>Bộ Sưu Tập Thẻ Bài</h3>
            <div class="inventory-list" id="inventoryList">
                <div class="empty-inventory">Chưa mở được thẻ bài nào</div>
            </div>
        </div>
    </div>

    <div class="popup-overlay" id="popupOverlay">
        <div class="popup">
            <h2 id="popupTitle">SIÊU CẤP QUÝ HIẾM! 🌟</h2>
            <p id="popupText"></p>
            <button id="closeBtn">Tiếp tục</button>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
